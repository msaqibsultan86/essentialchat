name: Build Essential Chat

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # need full history to sort zips by upload time

      - name: Pick the most recently uploaded zip
        run: |
          NEWEST=""
          NEWEST_TIME=0
          for f in $(git ls-files '*.zip'); do
            T=$(git log -1 --format=%ct -- "$f")
            if [ "$T" -gt "$NEWEST_TIME" ]; then
              NEWEST_TIME=$T
              NEWEST="$f"
            fi
          done
          if [ -z "$NEWEST" ]; then
            echo "No .zip found in repo!"; exit 1
          fi
          echo "Building newest zip: $NEWEST"
          echo "ZIP=$NEWEST" >> "$GITHUB_ENV"

      - name: Unzip it
        run: |
          rm -rf _build
          mkdir _build
          unzip -o "$ZIP" -d _build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Build
        run: |
          DIR=$(dirname "$(find _build -name build.gradle | head -1)")
          echo "Project dir: $DIR"
          cd "$DIR"
          gradle build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: EssentialChat
          path: _build/**/build/libs/*.jar
