name: Build Essential Chat

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pick the most recently committed zip
        run: |
          NEWEST=""
          NEWEST_TIME=0
          # list all zips tracked by git
          for f in $(git ls-files '*.zip'); do
            T=$(git log -1 --format=%ct -- "$f" 2>/dev/null)
            # default to 0 if git gave nothing
            if [ -z "$T" ]; then T=0; fi
            if [ "$T" -ge "$NEWEST_TIME" ]; then
              NEWEST_TIME="$T"
              NEWEST="$f"
            fi
          done
          # fallback: if still nothing, just grab any zip on disk
          if [ -z "$NEWEST" ]; then
            NEWEST=$(ls -1 *.zip 2>/dev/null | head -1)
          fi
          if [ -z "$NEWEST" ]; then
            echo "No .zip found in repo!"
            ls -la
            exit 1
          fi
          echo "Building newest zip: $NEWEST"
          echo "ZIP=$NEWEST" >> "$GITHUB_ENV"

      - name: Unzip it
        run: |
          rm -rf _build
          mkdir _build
          unzip -o "$ZIP" -d _build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Build
        run: |
          GRADLE_FILE=$(find _build -name build.gradle | head -1)
          DIR=$(dirname "$GRADLE_FILE")
          echo "Project dir: $DIR"
          cd "$DIR"
          gradle build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: EssentialChat
          path: _build/**/build/libs/*.jar
