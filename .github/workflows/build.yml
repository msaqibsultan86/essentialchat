name: Build From Zip
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip the mod
        run: |
          ZIP=$(ls *.zip | head -1)
          echo "Found zip: $ZIP"
          unzip -o "$ZIP" -d _src

      - name: Find project folder
        id: find
        run: |
          DIR=$(dirname "$(find _src -name build.gradle | head -1)")
          echo "Project dir: $DIR"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Build
        run: |
          cd "${{ steps.find.outputs.dir }}"
          gradle build --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: built-mod
          path: '**/build/libs/*.jar'
