name: Build Essential Chat

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find and unzip the newest zip
        run: |
          NEWEST=$(ls -t *.zip | head -1)
          echo "Building: $NEWEST"
          rm -rf _build
          mkdir _build
          unzip -o "$NEWEST" -d _build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Build
        run: |
          DIR=$(dirname "$(find _build -name build.gradle | head -1)")
          cd "$DIR"
          gradle build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: EssentialChat
          path: _build/**/build/libs/*.jar
