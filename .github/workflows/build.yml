name: Build From Zip
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find and unzip the newest mod zip
        run: |
          # picks the most recently committed .zip, whatever its name
          # (EssentialChat.zip, EssentialChat (1).zip, EssentialChat[25].zip, etc.)
          ZIP=$(ls -t *.zip 2>/dev/null | head -1)
          if [ -z "$ZIP" ]; then
            echo "No .zip file found in the repo root!"; exit 1
          fi
          echo "Using zip: $ZIP"
          rm -rf _src && mkdir _src
          unzip -o "$ZIP" -d _src >/dev/null

      - name: Find project folder
        id: find
        run: |
          GRADLE=$(find _src -name build.gradle | head -1)
          if [ -z "$GRADLE" ]; then
            echo "No build.gradle found inside the zip!"; exit 1
          fi
          DIR=$(dirname "$GRADLE")
          echo "Project dir: $DIR"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Build
        run: |
          cd "${{ steps.find.outputs.dir }}"
          gradle build --no-daemon

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: built-mod
          path: '**/build/libs/*.jar'
